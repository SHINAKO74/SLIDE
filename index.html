<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>CONTRAST</title>
    <style>
        :root {
            --bg-color: #c0c0c0;
            --cell-size: 11vmin; 
            --gap: 1.2vmin;
            --dot-size: 4vmin;
            --anim-speed: 0.4s;
            --custom-spring: cubic-bezier(0.43, 1.7, 0.64, 0.8);
        }

        body {
            margin: 0;
            background: var(--bg-color);
            font-family: sans-serif;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            user-select: none;
            overflow: hidden;
        }

        /* --- タイトル画面 --- */
        #title-screen {
            position: fixed;
            top: 0;
            left: 0;
            z-index: 2000;
            width: 100vw;
            height: 100vh;
            background: var(--bg-color);
            display: flex;
            justify-content: center;
            align-items: center;
            transition: opacity 0.5s ease;
        }

        .title-container {
            position: relative;
            width: 80vmin;
        }

        #title-logo {
            width: 100%;
            height: auto;
            display: block;
        }

        .title-btn {
            position: absolute;
            background: transparent;
            border: none;
            cursor: pointer;
            padding: 0;
            filter: invert(1);
            transition: filter 0.3s ease, transform 0.2s ease;
        }

        .title-btn:hover {
            filter: invert(0);
            transform: scale(1.05);
        }

        .title-btn img {
            width: 35vmin;
            height: auto;
        }

        #btn-play {
            top: 15%;
            left: 10%;
        }

        #btn-about {
            bottom: 15%;
            right: 10%;
        }

        /* --- ゲーム画面 --- */
        #wrapper {
            position: relative;
            display: none; 
            flex-direction: column;
            align-items: center;
            opacity: 0;
            transition: opacity 0.8s ease;
        }

        #side-right {
            position: absolute;
            top: 0;
            right: -11vmin; 
            display: flex;
            flex-direction: column;
            gap: 3vmin;
            z-index: 100;
        }

        .image-button {
            background: transparent;
            border: none;
            cursor: pointer;
            transition: filter 0.2s ease;
        }

        .image-button:hover {
            filter: invert(1);
        }

        .image-button img {
            width: 20vmin;
            height: auto;
        }

        #game-container {
            position: relative;
            display: grid;
            grid-template-columns: repeat(6, var(--cell-size));
            grid-template-rows: repeat(5, var(--cell-size));
            gap: var(--gap);
            margin-bottom: 6vmin;
        }

        .cell {
            position: relative;
            width: var(--cell-size);
            height: var(--cell-size);
            background: #fff;
            border: 0.4vmin solid #333;
            box-sizing: border-box;
            z-index: 1;
            opacity: 0;
            transform: scale(0);
            transition: opacity 0.4s ease, transform 0.5s var(--custom-spring), 
                        background-color 0.5s ease, border-color 0.5s ease;
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: 900;
            font-size: 7vmin;
            color: transparent; 
        }

        .cell.show {
            opacity: 1;
            transform: scale(1);
        }

        .cell.visited {
            background: #000;
            border-color: #000;
        }

        .cell.show-text {
            color: #fff !important;
        }

        .cell[data-index="25"] {
            background: black;
        }

        .cell.fade-out {
            opacity: 0;
            transform: scale(0.6);
            transition: 0.6s ease-in-out;
            color: #666;
        }

        .cell.target-fade {
            opacity: 0;
            transform: scale(0.9);
            transition: 1.5s ease-out;
        }

        .cell.white-target-text {
            color: #000 !important;
        }

        .cell.black-target-text {
            color: #fff !important;
        }

        #player {
            width: calc(var(--cell-size) - 3vmin);
            height: calc(var(--cell-size) - 3vmin);
            background: white;
            border-radius: 50%;
            position: absolute;
            top: 0;
            left: 0;
            margin: 1.5vmin;
            z-index: 10;
            transition: transform var(--anim-speed) var(--custom-spring), opacity 0.5s;
            opacity: 0;
        }

        #player.initialized {
            opacity: 1;
        }

        #indicators {
            display: flex;
            flex-direction: column;
            gap: 2vmin;
        }

        .indicator-row {
            display: grid;
            grid-template-columns: repeat(6, var(--cell-size));
            gap: var(--gap);
        }

        .dot-wrapper {
            display: flex;
            justify-content: center;
            align-items: center;
            width: var(--cell-size);
            height: 8vmin;
        }

        .dot { 
            width: var(--dot-size);
            height: var(--dot-size);
            border-radius: 50%; 
            background: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: 900;
            font-size: 8.5vmin;
            color: transparent;
        }

        .dot.active {
            background: #000;
        }

        .dot.reveal-text { 
            background: transparent !important; 
            animation: textEmphasis 0.7s var(--custom-spring) forwards; 
            z-index: 500;
        }

        .dot.final-fade {
            animation: fadeOutOnly 1.2s ease-in-out forwards !important;
            pointer-events: none;
        }

        @keyframes fadeOutOnly {
            0% {
                opacity: 1;
                transform: scale(1.2);
            }
            100% {
                opacity: 0;
                transform: scale(1.0);
            }
        }

        #whiteRow .dot.reveal-text {
            color: #fff;
        }

        #blackRow .dot.reveal-text {
            color: #000;
        }

        @keyframes textEmphasis {
            0% {
                transform: scale(0);
                opacity: 0;
            }
            50% {
                transform: scale(1.6);
                opacity: 1;
            }
            100% {
                transform: scale(1.2);
                opacity: 1;
            }
        }

        @keyframes clearImgIn {
            0% {
                transform: scale(0.5);
                opacity: 0;
            }
            100% {
                transform: scale(1);
                opacity: 1;
            }
        }

        #modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(0, 0, 0, 0.85);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 5000;
            cursor: pointer;
        }

        #modal-content img {
            max-width: 85vw;
            max-height: 85vh;
            border-radius: 2vmin;
        }

        #clear-msg {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            display: none;
            flex-direction: column;
            align-items: center;
            z-index: 300;
        }

        #clear-msg img {
            width: 80vw;
            max-width: 800px;
            animation: clearImgIn 0.8s ease-out forwards;
        }

        #clear-btns {
            margin-top: 4vmin;
            display: flex;
            gap: 3vmin;
            opacity: 0;
            transition: opacity 0.5s ease;
        }

        #clear-btns.show {
            opacity: 1;
        }

        /* --- 行き詰まりメッセージ --- */
        #stuck-msg {
            position: absolute;
            bottom: calc(15vmin + 3vmin); 
            left: 50%;
            transform: translateX(-50%) scale(2.5);
            z-index: 50;
            display: none;
            max-width: 95%;
        }

        #stuck-msg img {
            width: auto;
            height: auto;
            max-width: 100%;
            display: block;
        }

        #stuck-msg.show {
            display: block;
            animation: blink 1s steps(1, end) infinite;
        }

        @keyframes blink {
            0%, 49% {
                opacity: 1;
            }
            50%, 99% {
                opacity: 0;
            }
        }
    </style>
</head>
<body>

<div id="title-screen">
    <div class="title-container">
        <button id="btn-play" class="title-btn">
            <img src="play_btn.png" alt="PLAY">
        </button>
        <img src="title.jpg" alt="CONTRAST" id="title-logo">
        <button id="btn-about" class="title-btn">
            <img src="about_btn.png" alt="ABOUT">
        </button>
    </div>
</div>

<div id="wrapper">
    <div id="side-right">
        <button class="image-button" id="btn-reset">
            <img src="reset_btn.png" alt="Reset">
        </button>
        <button class="image-button" id="btn-howto">
            <img src="howto_btn.png" alt="Howto">
        </button>
    </div>
    <div id="game-container"></div>
    <div id="stuck-msg">
        <img src="telling.png" alt="これ以上は動けません。リセットしましょう。">
    </div>
    <div id="indicators">
        <div id="whiteRow" class="indicator-row"></div>
        <div id="blackRow" class="indicator-row"></div>
    </div>
</div>

<div id="modal-overlay">
    <div id="modal-content">
        <img src="manual.png" alt="Manual">
    </div>
</div>

<div id="clear-msg">
    <img src="clear.jpg" alt="Clear">
    <div id="clear-btns">
        <button id="btn-tweet" class="image-button" 
                style="background:#00acee; border-radius:1.5vmin; padding:2vmin 4vmin; 
                       color:white; font-family:sans-serif; font-weight:bold; 
                       font-size:3vmin; min-width:20vmin;">
            TWEET
        </button>
        <button id="btn-title" class="image-button" 
                style="background:#333; border-radius:1.5vmin; padding:2vmin 4vmin; 
                       color:white; font-family:sans-serif; font-weight:bold; 
                       font-size:3vmin; min-width:20vmin;">
            TITLE
        </button>
    </div>
</div>

<script>
// ゲーム定数
const ALPHA_LIST = "ABCDEFGHIJKLMNOPQRSTUVWXYZ".split("");
const ALPHA_MAP = {
    A: 0, B: 1, C: 2, D: 3, E: 4, F: 5, G: 6, H: 7, I: 8, J: 9,
    K: 10, L: 11, M: 12, N: 13, O: 14, P: 15, Q: 16, R: 17, S: 18, T: 19,
    U: 20, V: 21, W: 22, X: 23, Y: 24, Z: 25
};
const WHITE_TARGETS = { W: 22, H: 7, I: 8, T: 19, E: 4 };
const BLACK_TARGETS = { B: 1, L: 11, A: 0, C: 2, K: 10 };

// ゲーム状態
let visited = new Set();
let currentPos = 25;
let isCleared = false;
let isPaused = false;
let playerEl;
let stuckTimeout = null;

/**
 * インデックスからグリッド座標を取得
 */
function getCoord(i) {
    if (i < 20) {
        return {
            x: i % 5,
            y: Math.floor(i / 5)
        };
    } else {
        return {
            x: i - 20,
            y: 4
        };
    }
}

/**
 * ゲームの初期化
 */
function init() {
    const container = document.getElementById("game-container");
    container.innerHTML = '';
    
    // プレイヤー要素を作成
    playerEl = document.createElement("div");
    playerEl.id = "player";
    container.appendChild(playerEl);
    
    // セルを作成
    for (let i = 0; i < 26; i++) {
        const cell = document.createElement("div");
        cell.className = "cell";
        cell.dataset.index = i;
        cell.textContent = ALPHA_LIST[i];
        
        const pos = getCoord(i);
        cell.style.gridColumn = pos.x + 1;
        cell.style.gridRow = pos.y + 1;
        
        container.appendChild(cell);
    }
    
    // インジケーター行を設定
    setupIndicatorRow(["W", "H", "I", "T", "E"], "whiteRow", "w");
    setupIndicatorRow(["B", "L", "A", "C", "K"], "blackRow", "b");
    
    resetGame();
}

/**
 * インジケーター行を設定
 */
function setupIndicatorRow(chars, rowId, prefix) {
    const row = document.getElementById(rowId);
    row.innerHTML = '';
    
    chars.forEach(char => {
        const wrap = document.createElement("div");
        wrap.className = "dot-wrapper";
        
        const dot = document.createElement("div");
        dot.className = "dot";
        dot.id = `${prefix}-${char}`;
        dot.textContent = char;
        
        wrap.appendChild(dot);
        row.appendChild(wrap);
    });
}

/**
 * タイトル画面からゲーム画面への遷移
 */
function startSequence() {
    const titleScreen = document.getElementById("title-screen");
    const wrapper = document.getElementById("wrapper");
    
    // タイトル画面をフェードアウト
    titleScreen.style.opacity = "0";
    
    setTimeout(() => {
        titleScreen.style.display = "none";
        wrapper.style.display = "flex";
        
        setTimeout(() => {
            wrapper.style.opacity = "1";
            
            // セルを順次表示
            document.querySelectorAll(".cell").forEach(cell => {
                const idx = parseInt(cell.dataset.index);
                const pos = getCoord(idx);
                const dist = Math.sqrt(
                    Math.pow(pos.x - 4, 2) + Math.pow(pos.y - 4, 2)
                );
                
                setTimeout(() => {
                    cell.classList.add("show");
                }, dist * 100);
            });
            
            // プレイヤーを表示
            setTimeout(() => {
                playerEl.classList.add("initialized");
            }, 1200);
        }, 50);
    }, 500);
}

/**
 * プレイヤーの位置を更新
 */
function updatePlayerPos() {
    const pos = getCoord(currentPos);
    const unit = Math.min(window.innerHeight, window.innerWidth) / 100;
    const step = (11 + 1.2) * unit;
    
    playerEl.style.transform = `translate(${pos.x * step}px, ${pos.y * step}px)`;
}

/**
 * 移動可能かチェック
 */
function canMove() {
    const curr = getCoord(currentPos);
    const directions = [
        [0, -1],  // 上
        [0, 1],   // 下
        [-1, 0],  // 左
        [1, 0]    // 右
    ];
    
    for (const [dx, dy] of directions) {
        const tx = curr.x + dx;
        const ty = curr.y + dy;
        
        // その座標にセルがあり、まだ訪問していないかチェック
        for (let i = 0; i < 26; i++) {
            const c = getCoord(i);
            if (c.x === tx && c.y === ty && !visited.has(i)) {
                return true;
            }
        }
    }
    
    return false;
}

/**
 * 行き詰まりをチェック
 */
function checkStuck() {
    // 既存のタイムアウトをクリア
    if (stuckTimeout) {
        clearTimeout(stuckTimeout);
        stuckTimeout = null;
    }
    
    // クリア後はチェックしない
    if (isCleared) {
        return;
    }
    
    // 初期位置（Z）にいる場合はチェックしない
    if (currentPos === 25) {
        return;
    }
    
    if (!canMove()) {
        stuckTimeout = setTimeout(() => {
            document.getElementById("stuck-msg").classList.add("show");
        }, 3000);
    }
}

/**
 * プレイヤーを移動
 */
function move(dx, dy) {
    if (isCleared || isPaused) {
        return;
    }
    
    const curr = getCoord(currentPos);
    const tx = curr.x + dx;
    const ty = curr.y + dy;
    
    // 移動先のセルを探す
    let next = -1;
    for (let i = 0; i < 26; i++) {
        const c = getCoord(i);
        if (c.x === tx && c.y === ty) {
            next = i;
            break;
        }
    }
    
    // 移動先が無効または既に訪問済みの場合
    if (next === -1 || visited.has(next)) {
        return;
    }
    
    // stuck-msgを非表示にする
    if (stuckTimeout) {
        clearTimeout(stuckTimeout);
        stuckTimeout = null;
    }
    document.getElementById("stuck-msg").classList.remove("show");
    
    // 移動処理
    currentPos = next;
    visited.add(next);
    
    // セルを訪問済みにする
    const cell = document.querySelector(`.cell[data-index="${next}"]`);
    if (cell && next !== 25) {
        cell.classList.add("visited");
        
        // E と U の位置では文字を表示
        if (next === 4 || next === 20) {
            cell.classList.add("show-text");
        }
    }
    
    // インジケーターを更新
    for (const [char, pos] of Object.entries(WHITE_TARGETS)) {
        if (pos === next) {
            document.getElementById(`w-${char}`).classList.add("active");
        }
    }
    for (const [char, pos] of Object.entries(BLACK_TARGETS)) {
        if (pos === next) {
            document.getElementById(`b-${char}`).classList.add("active");
        }
    }
    
    updatePlayerPos();
    
    // クリア判定
    const whiteFail = Object.values(WHITE_TARGETS).some(p => visited.has(p));
    const blackComp = Object.values(BLACK_TARGETS).every(p => visited.has(p));
    
    if (!whiteFail && blackComp) {
        isCleared = true;
        setTimeout(() => {
            playerEl.style.opacity = 0;
            startClearAnim();
        }, 800);
    } else {
        setTimeout(checkStuck, 500);
    }
}

/**
 * クリアアニメーション
 */
async function startClearAnim() {
    document.getElementById("side-right").style.opacity = 0;
    
    const alphaReverse = [...ALPHA_LIST].reverse();
    const baseInterval = 350;
    
    for (const char of alphaReverse) {
        const isWhite = Object.keys(WHITE_TARGETS).includes(char);
        const isBlack = Object.keys(BLACK_TARGETS).includes(char);
        const idx = ALPHA_MAP[char];
        
        // セルのアニメーション
        const cell = document.querySelector(`.cell[data-index="${idx}"]`);
        if (cell) {
            if (isWhite) {
                cell.classList.add("target-fade", "white-target-text");
            } else if (isBlack) {
                cell.classList.add("target-fade", "black-target-text");
            } else {
                cell.classList.add("fade-out");
            }
        }
        
        // ドットのアニメーション
        const dotWhite = document.getElementById(`w-${char}`);
        const dotBlack = document.getElementById(`b-${char}`);
        
        if (dotWhite) {
            dotWhite.classList.add("reveal-text");
        }
        if (dotBlack) {
            dotBlack.classList.add("reveal-text");
        }
        
        const waitTime = (isWhite || isBlack) ? 1500 : baseInterval;
        await new Promise(resolve => setTimeout(resolve, waitTime));
    }
    
    // 最終フェードアウト
    setTimeout(() => {
        document.querySelectorAll(".dot.reveal-text").forEach(dot => {
            dot.classList.add("final-fade");
        });
        
        // クリアメッセージを表示
        setTimeout(() => {
            document.getElementById("clear-msg").style.display = "flex";
            setTimeout(() => {
                document.getElementById("clear-btns").classList.add("show");
            }, 800);
        }, 1500);
    }, 500);
}

/**
 * ゲームをリセット
 */
function resetGame() {
    // stuck-msg関連のタイマーと表示を最初にクリア
    if (stuckTimeout) {
        clearTimeout(stuckTimeout);
        stuckTimeout = null;
    }
    const stuckMsg = document.getElementById("stuck-msg");
    stuckMsg.classList.remove("show");
    stuckMsg.style.display = "none";
    
    visited.clear();
    currentPos = 25;
    isCleared = false;
    
    // UI要素をリセット
    document.getElementById("clear-msg").style.display = "none";
    document.getElementById("clear-btns").classList.remove("show");
    document.getElementById("side-right").style.opacity = 1;
    
    // プレイヤーをリセット
    playerEl.style.transition = `transform 0.6s var(--custom-spring), opacity 0.5s`;
    playerEl.style.opacity = 1;
    
    // セルをリセット
    document.querySelectorAll(".cell").forEach(cell => {
        cell.classList.remove(
            "visited", "fade-out", "target-fade",
            "white-target-text", "black-target-text", "show-text"
        );
        
        if (document.getElementById("title-screen").style.display === "none") {
            cell.classList.add("show");
        }
    });
    
    // ドットをリセット
    document.querySelectorAll(".dot").forEach(dot => {
        dot.classList.remove("active", "reveal-text", "final-fade");
        dot.style.animation = "";
    });
    
    // 初期位置を訪問済みに
    visited.add(25);
    updatePlayerPos();
    
    setTimeout(() => {
        playerEl.style.transition = "";
        // stuck-msgを再び表示可能にする
        stuckMsg.style.display = "";
    }, 600);
}

// ===== イベントリスナー =====

// ツイートボタン
document.getElementById("btn-tweet").onclick = () => {
    const url = window.location.href;
    const text = "CONTRAST Clear! ⬛️⬜️\n" +
                 "白と黒の狭間を通り抜け、鮮やかなコントラストを完成させた。\n\n" +
                 "⇩あなたもこちらからプレイ⇩\n" + url + "\n\n" +
                 "#CONTRAST\n#宇宙謎";
    const tweetUrl = `https://twitter.com/intent/tweet?text=${encodeURIComponent(text)}`;
    window.open(tweetUrl, '_blank');
};

// タイトル画面ボタン
document.getElementById("btn-play").onclick = startSequence;

document.getElementById("btn-about").onclick = () => {
    document.getElementById("modal-overlay").style.display = "flex";
    isPaused = true;
};

// ゲーム画面ボタン
document.getElementById("btn-howto").onclick = () => {
    document.getElementById("modal-overlay").style.display = "flex";
    isPaused = true;
};

document.getElementById("modal-overlay").onclick = () => {
    document.getElementById("modal-overlay").style.display = "none";
    isPaused = false;
};

document.getElementById("btn-reset").onclick = resetGame;

document.getElementById("btn-title").onclick = () => {
    const wrapper = document.getElementById("wrapper");
    const titleScreen = document.getElementById("title-screen");
    const clearMsg = document.getElementById("clear-msg");
    const clearBtns = document.getElementById("clear-btns");
    
    // ボタンを消す
    clearBtns.style.opacity = "0";
    
    // クリアメッセージをフェードアウト
    setTimeout(() => {
        clearMsg.style.transition = "opacity 0.5s ease";
        clearMsg.style.opacity = "0";
        
        // クリアメッセージのフェードアウト完了後、0.2秒待つ
        setTimeout(() => {
            clearMsg.style.display = "none";
            clearMsg.style.opacity = "1";
            clearMsg.style.transition = "";
            
            // ゲーム画面をフェードアウト
            wrapper.style.transition = "opacity 1.5s ease";
            wrapper.style.opacity = "0";
            
            // フェードアウトが完全に終わるまで待つ
            setTimeout(() => {
                wrapper.style.display = "none";
                
                // タイトル画面を表示準備
                titleScreen.style.display = "flex";
                titleScreen.style.opacity = "0";
                titleScreen.style.transition = "opacity 1.5s ease";
                
                // 少し待ってからフェードイン開始
                setTimeout(() => {
                    titleScreen.style.opacity = "1";
                    
                    // フェードインが完了してからリセット
                    setTimeout(() => {
                        resetGame();
                        // セルを非表示に戻す
                        document.querySelectorAll(".cell").forEach(cell => {
                            cell.classList.remove("show");
                        });
                        playerEl.classList.remove("initialized");
                        // transitionを元に戻す
                        titleScreen.style.transition = "opacity 0.5s ease";
                        wrapper.style.transition = "opacity 0.8s ease";
                    }, 1600);
                }, 100);
            }, 1600);
        }, 700); // 0.5秒フェード + 0.2秒待機
    }, 100);
};

// キーボード操作
document.onkeydown = (e) => {
    // タイトル画面でスペースキーを押してゲーム開始
    if (e.key === " " && document.getElementById("title-screen").style.display !== "none") {
        e.preventDefault();
        startSequence();
        return;
    }
    
    // 矢印キーでの移動
    if (e.key === "ArrowUp") {
        move(0, -1);
    } else if (e.key === "ArrowDown") {
        move(0, 1);
    } else if (e.key === "ArrowLeft") {
        move(-1, 0);
    } else if (e.key === "ArrowRight") {
        move(1, 0);
    }
    // スペースキー or Rキーでリセット（ゲーム画面、クリア演出中は無効）
    else if (e.key === " " || e.key === "r" || e.key === "R") {
        e.preventDefault(); // スペースキーのスクロールを防止
        if (document.getElementById("wrapper").style.display === "flex" && !isCleared) {
            resetGame();
        }
    }
    // Aキーで操作方法
    else if (e.key === "a" || e.key === "A") {
        if (document.getElementById("wrapper").style.display === "flex" && !isCleared) {
            document.getElementById("modal-overlay").style.display = "flex";
            isPaused = true;
        }
    }
    // Zキーで About（タイトル画面のみ）
    else if (e.key === "z" || e.key === "Z") {
        if (document.getElementById("title-screen").style.display !== "none") {
            document.getElementById("modal-overlay").style.display = "flex";
            isPaused = true;
        }
    }
    // Escキーでモーダルを閉じる
    else if (e.key === "Escape") {
        document.getElementById("modal-overlay").style.display = "none";
        isPaused = false;
    }
};

// タッチ操作
let touchStartX = 0;
let touchStartY = 0;

document.addEventListener('touchstart', (e) => {
    touchStartX = e.touches[0].clientX;
    touchStartY = e.touches[0].clientY;
}, { passive: false });

document.addEventListener('touchend', (e) => {
    if (isCleared || isPaused) {
        return;
    }
    
    const dx = e.changedTouches[0].clientX - touchStartX;
    const dy = e.changedTouches[0].clientY - touchStartY;
    
    if (Math.abs(dx) > Math.abs(dy)) {
        if (Math.abs(dx) > 30) {
            move(dx > 0 ? 1 : -1, 0);
        }
    } else {
        if (Math.abs(dy) > 30) {
            move(0, dy > 0 ? 1 : -1);
        }
    }
}, { passive: false });

// リサイズ対応
window.addEventListener('resize', updatePlayerPos);

// 初期化実行
init();
</script>
